version: '3.8'

services:
  backend:
    build: .
    container_name: sign-language-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - PORT=8000
      - ENV=development
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

